name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Clone stock-analysis-mcp (required dependency)
        run: |
          if ! git clone --depth 1 https://github.com/shushuzn/stock-analysis-mcp.git ../stock-analysis-mcp 2>/dev/null; then
            echo "::warning::stock-analysis-mcp not available, some imports may fail"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install pytest pytest-asyncio httpx

      - name: Run tests
        run: PYTHONPATH="$PWD/src:$PYTHONPATH" python -m pytest tests/ -v --tb=short

  lint:
    name: ruff lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check src/ --output-format=github

  typecheck:
    name: type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install mypy
        run: pip install mypy types-requests

      - name: Run mypy
        run: PYTHONPATH="$PWD/src:$PYTHONPATH" python -m mypy src/ --ignore-missing-imports --follow-imports=skip
