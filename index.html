<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Stock Analysis Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--blue);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }

  .llm-toggle {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    padding: 0.5rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    transition: border-color 0.2s, color 0.2s;
  }

  .llm-toggle:hover { border-color: var(--purple); color: var(--purple); }
  .llm-toggle input { accent-color: var(--purple); cursor: pointer; }
  .llm-toggle.active { border-color: var(--purple); color: var(--purple); background: rgba(188,140,255,0.1); }

  button {
    background: linear-gradient(135deg, var(--blue), #1f6feb);
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.8rem;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .hint {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .hint code {
    background: var(--bg);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    color: var(--blue);
    font-size: 0.75rem;
  }

  /* Report */
  #report {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }

  #report.show { display: block; }

  .report-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.02);
  }

  .report-header .symbol {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .report-header .source {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--bg);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
  }

  .report-body {
    padding: 1.5rem;
    font-size: 0.9rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Signal badges */
  .signal-bull { color: var(--green); }
  .signal-bear { color: var(--red); }
  .signal-neutral { color: var(--yellow); }

  /* Loading */
  #loading {
    display: none;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }

  #loading.show { display: block; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  #error {
    display: none;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 1rem;
    color: var(--red);
    margin-bottom: 1rem;
  }

  #error.show { display: block; }

  /* Sections in report */
  .section { margin-bottom: 1.5rem; }
  .section-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    color: var(--blue);
  }
  .metric {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .metric:last-child { border-bottom: none; }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>📊 Stock Analysis Agent</h1>
    <p>AI-powered investment analysis · US stocks & China A-shares</p>
  </header>

  <div class="search-box">
    <div class="input-row">
      <input type="text" id="queryInput" placeholder='e.g. 苹果技术分析 / AAPL RSI MACD / 贵州茅台趋势'
             onkeydown="if(event.key==='Enter') analyze()">
      <select id="periodSelect">
        <option value="1mo">1个月</option>
        <option value="3mo">3个月</option>
        <option value="6mo" selected>6个月</option>
        <option value="1y">1年</option>
        <option value="2y">2年</option>
      </select>
      <label class="llm-toggle" id="llmToggle" onclick="toggleLlm()">
        <input type="checkbox" id="llmCheck">
        🤖 LLM
      </label>
      <button id="analyzeBtn" onclick="analyze()">
        <span>🔍</span> 分析
      </button>
    </div>
    <div class="hint">
      示例: <code>AAPL</code> <code>NVDA</code> <code>600519</code> <code>茅台技术分析</code> <code>苹果 RSI MACD</code>
    </div>
  </div>

  <div id="error"></div>

  <div id="loading">
    <div class="spinner"></div>
    <div>分析中...</div>
  </div>

  <div id="report">
    <div class="report-header">
      <span class="symbol" id="reportSymbol"></span>
      <span class="source" id="reportSource"></span>
    </div>
    <div class="report-body" id="reportBody"></div>
  </div>

  <div class="footer">
    Powered by <a href="#">Stock Analysis Agent</a> · Data: Stooq · Tencent Finance · yfinance
  </div>
</div>

<script>
  const API = 'http://localhost:8001';

  function toggleLlm() {
    const check = document.getElementById('llmCheck');
    const toggle = document.getElementById('llmToggle');
    check.checked = !check.checked;
    toggle.classList.toggle('active', check.checked);
  }

  async function analyze() {
    const query = document.getElementById('queryInput').value.trim();
    const period = document.getElementById('periodSelect').value;
    const llm = document.getElementById('llmCheck').checked;

    if (!query) {
      showError('请输入分析指令');
      return;
    }

    // Show loading
    document.getElementById('loading').classList.add('show');
    document.getElementById('report').classList.remove('show');
    document.getElementById('error').classList.remove('show');
    document.getElementById('analyzeBtn').disabled = true;

    try {
      const res = await fetch(`${API}/analyze`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, period, llm })
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({ detail: res.statusText }));
        throw new Error(err.detail || '请求失败');
      }

      const data = await res.json();
      renderReport(data);
    } catch (e) {
      if (e.message.includes('fetch')) {
        showError('⚠️ API 未运行。请先启动服务器：<code>cd stock-analysis-agent && python run.py</code>');
      } else {
        showError(e.message);
      }
    } finally {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.innerHTML = msg;
    el.classList.add('show');
  }

  function renderReport(data) {
    document.getElementById('report').classList.add('show');
    document.getElementById('reportSymbol').textContent = data.symbol;
    document.getElementById('reportSource').textContent = data.report.match(/数据来源: ([^\\n]+)/)?.[1] || '';

    // LLM mode returns analysis text, data mode returns report
    let text = data.mode === 'llm' ? data.analysis : data.report;

    // Colorize signals
    text = text.replace(/🟢/g, '<span class="signal-bull">🟢</span>');
    text = text.replace(/🔴/g, '<span class="signal-bear">🔴</span>');
    text = text.replace(/⚪/g, '<span class="signal-neutral">⚪</span>');

    // Format markdown-ish headers in LLM output
    if (data.mode === 'llm') {
      text = text.replace(/^## (.+)$/gm, '<strong style="color:var(--blue)">$1</strong>');
      text = text.replace(/^# (.+)$/gm, '<strong style="color:var(--purple);font-size:1.1em">$1</strong>');
      text = text.replace(/\n/g, '<br>');
    }

    document.getElementById('reportBody').innerHTML = text;
  }
</script>
</body>
</html>
