<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📊 Stock Analysis Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --green: #3fb950;
    --red: #f85149;
    --yellow: #d29922;
    --blue: #58a6ff;
    --purple: #bc8cff;
  }

  [data-theme=light] {
    --bg: #ffffff;
    --surface: #f6f8fa;
    --border: #d0d7de;
    --text: #1f2328;
    --muted: #656d76;
    --green: #1a7f37;
    --red: #cf222e;
    --yellow: #9a6700;
    --blue: #0969da;
    --purple: #8250df;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--blue), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
  }

  header p {
    color: var(--muted);
    font-size: 0.95rem;
  }

  .search-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .input-row {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  input[type="text"] {
    flex: 1;
    min-width: 200px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus {
    border-color: var(--blue);
  }

  input[type="text"]::placeholder {
    color: var(--muted);
  }

  select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.7rem 1rem;
    color: var(--text);
    font-size: 0.9rem;
    cursor: pointer;
    outline: none;
  }

  .llm-toggle {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    padding: 0.5rem 0.8rem;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    transition: border-color 0.2s, color 0.2s;
  }

  .llm-toggle:hover { border-color: var(--purple); color: var(--purple); }
  .llm-toggle input { accent-color: var(--purple); cursor: pointer; }
  .llm-toggle.active { border-color: var(--purple); color: var(--purple); background: rgba(188,140,255,0.1); }

  button {
    background: linear-gradient(135deg, var(--blue), #1f6feb);
    border: none;
    border-radius: 8px;
    padding: 0.7rem 1.8rem;
    color: #fff;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .hint {
    margin-top: 0.75rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .hint code {
    background: var(--bg);
    padding: 0.1rem 0.4rem;
    border-radius: 4px;
    color: var(--blue);
    font-size: 0.75rem;
  }

  /* Report */
  #report {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    display: none;
  }

  #report.show { display: block; }

  .report-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.02);
  }

  .report-header .symbol {
    font-size: 1.1rem;
    font-weight: 700;
  }

  .report-header .source {
    font-size: 0.75rem;
    color: var(--muted);
    background: var(--bg);
    padding: 0.2rem 0.6rem;
    border-radius: 20px;
  }

  .report-body {
    padding: 1.5rem;
    font-size: 0.9rem;
    line-height: 1.7;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* Signal badges */
  .signal-bull { color: var(--green); }
  .signal-bear { color: var(--red); }
  .signal-neutral { color: var(--yellow); }

  /* Loading */
  #loading {
    display: none;
    text-align: center;
    padding: 3rem;
    color: var(--muted);
  }

  #loading.show { display: block; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  #error {
    display: none;
    background: rgba(248, 81, 73, 0.1);
    border: 1px solid var(--red);
    border-radius: 8px;
    padding: 1rem;
    color: var(--red);
    margin-bottom: 1rem;
  }

  #error.show { display: block; }

  /* Sections in report */
  .section { margin-bottom: 1.5rem; }
  .section-title {
    font-weight: 700;
    font-size: 0.95rem;
    margin-bottom: 0.5rem;
    color: var(--blue);
  }
  .metric {
    display: flex;
    justify-content: space-between;
    padding: 0.3rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .metric:last-child { border-bottom: none; }

  .footer {
    text-align: center;
    margin-top: 2rem;
    font-size: 0.8rem;
    color: var(--muted);
  }

  .footer a { color: var(--blue); text-decoration: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:0.5rem;">
      <div>
        <h1>📊 Stock Analysis Agent</h1>
        <p>AI-powered investment analysis · US stocks & China A-shares</p>
      </div>
      <button onclick="toggleTheme()" id="themeBtn" title="切换主题"
              style="background:none;border:1px solid var(--border);padding:0.4rem 0.7rem;font-size:1rem;cursor:pointer;border-radius:8px;">
        🌙
      </button>
      <button onclick="loadPortfolio()" id="portfolioBtn" title="持仓模拟器"
              style="background:none;border:1px solid var(--border);padding:0.4rem 0.7rem;font-size:1rem;cursor:pointer;border-radius:8px;">
        💼
      </button>
      <button onclick="loadWatchlist()" id="watchlistBtn" title="自选股监控"
              style="background:none;border:1px solid var(--border);padding:0.4rem 0.7rem;font-size:1rem;cursor:pointer;border-radius:8px;">
        👁️
      </button>
      <button onclick="loadHistory()" id="historyBtn" title="历史记录"
              style="background:none;border:1px solid var(--border);padding:0.4rem 0.7rem;font-size:1rem;cursor:pointer;border-radius:8px;">
        📜
      </button>
    </div>
  </header>

  <div class="search-box">
    <div class="input-row">
      <input type="text" id="queryInput" placeholder='e.g. 苹果技术分析 / AAPL RSI MACD / 贵州茅台趋势'
             onkeydown="if(event.key==='Enter') analyze()">
      <select id="periodSelect">
        <option value="1mo">1个月</option>
        <option value="3mo">3个月</option>
        <option value="6mo" selected>6个月</option>
        <option value="1y">1年</option>
        <option value="2y">2年</option>
      </select>
      <label class="llm-toggle" id="llmToggle" onclick="toggleLlm()">
        <input type="checkbox" id="llmCheck">
        🤖 LLM
      </label>
      <label class="llm-toggle" id="streamToggle" onclick="toggleStream()">
        <input type="checkbox" id="streamCheck">
        📡 流式
      </label>
      <button id="analyzeBtn" onclick="analyze()">
        <span>🔍</span> 分析
      </button>
      <button id="compareBtn" onclick="compare()" style="background:linear-gradient(135deg,var(--purple),#8b5cf6);">
        <span>⚡</span> 对比
      </button>
    </div>
    <div class="hint">
      示例: <code>AAPL</code> <code>NVDA</code> <code>600519</code> <code>茅台技术分析</code> <code>苹果 RSI MACD</code> | <code>NVDA,AAPL,TSLA</code> 对比
    </div>
  </div>

  <div id="error"></div>

  <div id="loading">
    <div class="spinner"></div>
    <div>分析中...</div>
  </div>

  <div id="stream-output"
       style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;font-family:monospace;font-size:0.85rem;line-height:1.6;white-space:pre-wrap;word-break:break-word;max-height:60vh;overflow-y:auto;"></div>

  <div id="report">
    <div class="report-header">
      <span class="symbol" id="reportSymbol"></span>
      <span class="source" id="reportSource"></span>
      <button onclick="exportPdf()" style="background:none;border:1px solid var(--border);border-radius:6px;padding:0.2rem 0.6rem;font-size:0.75rem;cursor:pointer;color:var(--blue);">📄 PDF导出</button>
    </div>
    <div class="report-body" id="reportBody"></div>
  </div>

  <div id="compare-output" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;"></div>

  <div id="portfolio-panel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
      <span style="font-weight:700;color:var(--blue);font-size:1rem;">💼 持仓模拟器</span>
      <div style="display:flex;gap:0.5rem;">
        <button onclick="portfolioBuy()" style="background:linear-gradient(135deg,var(--green),#2ea043);border:none;border-radius:6px;padding:0.3rem 0.8rem;color:#fff;font-size:0.75rem;cursor:pointer;">买入</button>
        <button onclick="portfolioSell()" style="background:linear-gradient(135deg,var(--red),#b62324);border:none;border-radius:6px;padding:0.3rem 0.8rem;color:#fff;font-size:0.75rem;cursor:pointer;">卖出</button>
        <button onclick="portfolioClear()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--muted);font-size:0.75rem;cursor:pointer;">清空</button>
        <button onclick="loadPortfolio()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--muted);font-size:0.75rem;cursor:pointer;">刷新</button>
      </div>
    </div>
    <div id="portfolio-content">加载中...</div>
  </div>

  <div id="watchlist-panel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
      <span style="font-weight:700;color:var(--blue);font-size:1rem;">👁️ 自选股监控</span>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <button onclick="wlAdd()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--green);font-size:0.75rem;cursor:pointer;">+ 添加</button>
        <button onclick="wlRemove()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--red);font-size:0.75rem;cursor:pointer;">- 删除</button>
        <button onclick="wlSetAlert()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--yellow);font-size:0.75rem;cursor:pointer;">⚡ 预警</button>
        <button onclick="wlCheck()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--muted);font-size:0.75rem;cursor:pointer;">🔔 检查预警</button>
        <button onclick="ttsTest()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--purple);font-size:0.75rem;cursor:pointer;">🔊 测试语音</button>
        <button onclick="loadWatchlist()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--muted);font-size:0.75rem;cursor:pointer;">刷新</button>
      </div>
    </div>
    <div id="watchlist-content">加载中...</div>
  </div>

  <div id="history-panel" style="display:none;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;flex-wrap:wrap;gap:0.5rem;">
      <span style="font-weight:700;color:var(--blue);font-size:1rem;">📜 分析历史</span>
      <div style="display:flex;gap:0.5rem;flex-wrap:wrap;">
        <input type="text" id="historyFilter" placeholder="过滤股票代码..." onkeyup="renderHistory(currentHistory)" style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:0.25rem 0.6rem;color:var(--text);font-size:0.75rem;outline:none;">
        <button onclick="loadHistory()" style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:0.3rem 0.8rem;color:var(--muted);font-size:0.75rem;cursor:pointer;">刷新</button>
      </div>
    </div>
    <div id="history-content">加载中...</div>
  </div>

  <div class="footer">
    Powered by <a href="#">Stock Analysis Agent</a> · Data: Stooq · Tencent Finance · yfinance
  </div>
</div>

<script>
  const API = 'http://localhost:8001';

  function toggleTheme() {
    const isDark = document.body.dataset.theme !== 'light';
    document.body.dataset.theme = isDark ? 'light' : '';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isDark ? '🌙' : '🌞';
  }

  (function initTheme() {
    const saved = localStorage.getItem('theme');
    if (saved === 'light') {
      document.body.dataset.theme = 'light';
      document.getElementById('themeBtn').textContent = '🌞';
    }
  })();

  function toggleLlm() {
    const check = document.getElementById('llmCheck');
    const toggle = document.getElementById('llmToggle');
    check.checked = !check.checked;
    toggle.classList.toggle('active', check.checked);
  }

  function toggleStream() {
    const check = document.getElementById('streamCheck');
    const toggle = document.getElementById('streamToggle');
    check.checked = !check.checked;
    toggle.classList.toggle('active', check.checked);
  }

  async function analyze() {
    const query = document.getElementById('queryInput').value.trim();
    const period = document.getElementById('periodSelect').value;
    const llm = document.getElementById('llmCheck').checked;
    const stream = document.getElementById('streamCheck').checked;

    if (!query) {
      showError('请输入分析指令');
      return;
    }

    document.getElementById('loading').classList.add('show');
    document.getElementById('report').classList.remove('show');
    document.getElementById('error').classList.remove('show');
    document.getElementById('stream-output').classList.remove('show');
    document.getElementById('compare-output').style.display = 'none';
    document.getElementById('analyzeBtn').disabled = true;

    try {
      if (stream) {
        // SSE streaming mode
        const out = document.getElementById('stream-output');
        out.textContent = '';
        out.classList.add('show');
        document.getElementById('loading').classList.remove('show');

        const res = await fetch(`${API}/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, period, llm, stream: true })
        });
        if (!res.ok) throw new Error(await res.text());

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          out.textContent += buffer;
          out.scrollTop = out.scrollHeight;
          buffer = '';
        }
      } else {
        const res = await fetch(`${API}/analyze`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, period, llm, stream: false })
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({ detail: res.statusText }));
          throw new Error(err.detail || '请求失败');
        }
        const data = await res.json();
        renderReport(data);
      }
    } catch (e) {
      if (e.message.includes('fetch') || e.message.includes('Failed to fetch')) {
        showError('⚠️ API 未运行。请先启动服务器：<code>cd stock-analysis-agent && python run.py</code>');
      } else {
        showError(e.message);
      }
    } finally {
      document.getElementById('loading').classList.remove('show');
      document.getElementById('analyzeBtn').disabled = false;
    }
  }

  async function compare() {
    const query = document.getElementById('queryInput').value.trim();
    const period = document.getElementById('periodSelect').value;
    if (!query.includes(',')) {
      showError('对比模式请输入多个股票，用逗号分隔，如 NVDA,AAPL,TSLA');
      return;
    }
    const out = document.getElementById('compare-output');
    out.innerHTML = '<div style="color:var(--muted)">⚡ 对比分析中...</div>';
    out.style.display = 'block';
    document.getElementById('report').classList.remove('show');
    document.getElementById('error').classList.remove('show');
    document.getElementById('compareBtn').disabled = true;
    try {
      const res = await fetch(`${API}/compare?symbols=${encodeURIComponent(query)}&period=${encodeURIComponent(period)}`);
      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();
      let html = '<div style="margin-bottom:1rem;font-weight:700;color:var(--blue)">⚡ 横向对比结果</div>';
      html += '<table style="width:100%;border-collapse:collapse;font-size:0.85rem;">';
      html += '<tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.4rem 0.6rem">股票</th><th style="padding:0.4rem 0.6rem">夏普比率</th><th style="padding:0.4rem 0.6rem">最大回撤</th><th style="padding:0.4rem 0.6rem">波动率</th></tr>';
      for (const [sym, vals] of Object.entries(data)) {
        if (vals.error) continue;
        const sharpeColor = vals.sharpe_ratio >= 1 ? 'var(--green)' : vals.sharpe_ratio >= 0 ? 'var(--yellow)' : 'var(--red)';
        html += `<tr style="border-bottom:1px solid var(--border)">`;
        html += `<td style="padding:0.4rem 0.6rem;font-weight:700">${sym}</td>`;
        html += `<td style="padding:0.4rem 0.6rem;color:${sharpeColor}">${vals.sharpe_ratio}</td>`;
        html += `<td style="padding:0.4rem 0.6rem;color:${vals.max_drawdown < -0.1 ? 'var(--red)' : 'var(--text)'}">${(vals.max_drawdown * 100).toFixed(1)}%</td>`;
        html += `<td style="padding:0.4rem 0.6rem">${(vals.volatility * 100).toFixed(1)}%</td>`;
        html += `</tr>`;
      }
      html += '</table>';
      out.innerHTML = html;
    } catch (e) {
      if (e.message.includes('fetch') || e.message.includes('Failed to fetch')) {
        out.innerHTML = '';
        showError('⚠️ API 未运行。请先启动服务器：<code>cd stock-analysis-agent && python run.py</code>');
      } else {
        out.innerHTML = '';
        showError(e.message);
      }
    } finally {
      document.getElementById('compareBtn').disabled = false;
    }
  }

  function showError(msg) {
    const el = document.getElementById('error');
    el.innerHTML = msg;
    el.classList.add('show');
  }

  function renderReport(data) {
    document.getElementById('report').classList.add('show');
    document.getElementById('compare-output').style.display = 'none';
    document.getElementById('portfolio-panel').style.display = 'none';

    document.getElementById('report').classList.add('show');
    document.getElementById('reportSymbol').textContent = data.symbol;
    document.getElementById('reportSource').textContent = data.report.match(/数据来源: ([^\\n]+)/)?.[1] || '';

    // LLM mode returns analysis text, data mode returns report
    let text = data.mode === 'llm' ? data.analysis : data.report;

    // Colorize signals
    text = text.replace(/🟢/g, '<span class="signal-bull">🟢</span>');
    text = text.replace(/🔴/g, '<span class="signal-bear">🔴</span>');
    text = text.replace(/⚪/g, '<span class="signal-neutral">⚪</span>');

    // Format markdown-ish headers in LLM output
    if (data.mode === 'llm') {
      text = text.replace(/^## (.+)$/gm, '<strong style="color:var(--blue)">$1</strong>');
      text = text.replace(/^# (.+)$/gm, '<strong style="color:var(--purple);font-size:1.1em">$1</strong>');
      text = text.replace(/\n/g, '<br>');
    }

    document.getElementById('reportBody').innerHTML = text;
  }

  async function loadPortfolio() {
    const panel = document.getElementById('portfolio-panel');
    const content = document.getElementById('portfolio-content');
    panel.style.display = 'block';
    document.getElementById('report').classList.remove('show');
    document.getElementById('compare-output').style.display = 'none';
    content.innerHTML = '加载中...';
    try {
      const res = await fetch(`${API}/portfolio`);
      const data = await res.json();
      const symbols = Object.keys(data);
      if (!symbols.length) {
        content.innerHTML = '<div style="color:var(--muted)">暂无持仓，执行买入开始模拟</div>';
        return;
      }
      let html = '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;">';
      html += '<tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.3rem 0.5rem">股票</th><th style="padding:0.3rem 0.5rem">数量</th><th style="padding:0.3rem 0.5rem">成本价</th><th style="padding:0.3rem 0.5rem">现价</th><th style="padding:0.3rem 0.5rem">市值</th><th style="padding:0.3rem 0.5rem">盈亏</th><th style="padding:0.3rem 0.5rem">收益率</th></tr>';
      for (const sym of symbols) {
        const p = data[sym];
        if (p.quote_error) continue;
        const pnl = p.unrealized_pnl;
        const pnlPct = p.unrealized_pnl_pct;
        const color = pnl > 0 ? 'var(--green)' : pnl < 0 ? 'var(--red)' : 'var(--muted)';
        const pnlSign = pnl >= 0 ? '+' : '';
        html += `<tr style="border-bottom:1px solid var(--border)">`;
        html += `<td style="padding:0.3rem 0.5rem;font-weight:700">${sym}</td>`;
        html += `<td style="padding:0.3rem 0.5rem">${p.shares}</td>`;
        html += `<td style="padding:0.3rem 0.5rem">$${p.avg_cost}</td>`;
        html += `<td style="padding:0.3rem 0.5rem">$${p.current_price}</td>`;
        html += `<td style="padding:0.3rem 0.5rem">$${p.market_value}</td>`;
        html += `<td style="padding:0.3rem 0.5rem;color:${color}">${pnlSign}$${pnl.toFixed(2)}</td>`;
        html += `<td style="padding:0.3rem 0.5rem;color:${color}">${pnlSign}${pnlPct}%</td>`;
        html += `</tr>`;
      }
      html += '</table>';
      content.innerHTML = html;
    } catch (e) {
      content.innerHTML = `<div style="color:var(--red)">加载失败: ${e.message}</div>`;
    }
  }

  async function portfolioBuy() {
    const sym = prompt('股票代码:');
    if (!sym) return;
    const shares = parseFloat(prompt('数量:'));
    if (!shares) return;
    const price = parseFloat(prompt('买入价格:'));
    if (!price) return;
    try {
      const res = await fetch(`${API}/portfolio/buy`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symbol: sym.trim().toUpperCase(), shares, price })
      });
      const data = await res.json();
      if (data.error) { alert('失败: ' + data.error); return; }
      loadPortfolio();
    } catch (e) { alert('错误: ' + e.message); }
  }

  async function portfolioSell() {
    const sym = prompt('股票代码:');
    if (!sym) return;
    const shares = parseFloat(prompt('数量:'));
    if (!shares) return;
    const price = parseFloat(prompt('卖出价格:'));
    if (!price) return;
    try {
      const res = await fetch(`${API}/portfolio/sell`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ symbol: sym.trim().toUpperCase(), shares, price })
      });
      const data = await res.json();
      if (data.error) { alert('失败: ' + data.error); return; }
      loadPortfolio();
    } catch (e) { alert('错误: ' + e.message); }
  }

  async function portfolioClear() {
    if (!confirm('确定清空所有持仓？')) return;
    await fetch(`${API}/portfolio`, { method: 'DELETE' });
    loadPortfolio();
  }

  async function exportPdf() {
    const symbol = document.getElementById('reportSymbol').textContent;
    if (!symbol) { alert('请先执行分析'); return; }
    const query = document.getElementById('queryInput').value.trim() || symbol;
    window.open(`${API}/export?symbol=${encodeURIComponent(symbol)}&query=${encodeURIComponent(query)}`, '_blank');
  }

  async function loadWatchlist() {
    const panel = document.getElementById('watchlist-panel');
    const content = document.getElementById('watchlist-content');
    panel.style.display = 'block';
    document.getElementById('report').classList.remove('show');
    document.getElementById('compare-output').style.display = 'none';
    document.getElementById('portfolio-panel').style.display = 'none';
    content.innerHTML = '加载中...';
    try {
      const res = await fetch(`${API}/watchlist`);
      const data = await res.json();
      const symbols = data.symbols || [];
      const quotes = data.quotes || {};
      const alerts = data.alerts || {};
      if (!symbols.length) {
        content.innerHTML = '<div style="color:var(--muted)">暂无自选股，点击"+ 添加"添加股票</div>';
        return;
      }
      let html = '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;">';
      html += '<tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.3rem 0.5rem">股票</th><th style="padding:0.3rem 0.5rem">现价</th><th style="padding:0.3rem 0.5rem">涨跌</th><th style="padding:0.3rem 0.5rem">预警区间</th></tr>';
      for (const sym of symbols) {
        const q = quotes[sym] || {};
        const alert = alerts[sym] || {};
        const price = q.price ? `$${q.price}` : '-';
        const chg = q.change_pct != null ? `${q.change_pct > 0 ? '+' : ''}${q.change_pct}%` : '-';
        const chgColor = q.change_pct > 0 ? 'var(--green)' : q.change_pct < 0 ? 'var(--red)' : 'var(--muted)';
        const alertStr = (alert.above || alert.below) ? `${alert.below || '-'} ~ ${alert.above || '-'}` : '-';
        html += `<tr style="border-bottom:1px solid var(--border)">`;
        html += `<td style="padding:0.3rem 0.5rem;font-weight:700">${sym}</td>`;
        html += `<td style="padding:0.3rem 0.5rem">${price}</td>`;
        html += `<td style="padding:0.3rem 0.5rem;color:${chgColor}">${chg}</td>`;
        html += `<td style="padding:0.3rem 0.5rem;color:var(--yellow);font-size:0.75rem">${alertStr}</td>`;
        html += `</tr>`;
      }
      html += '</table>';
      content.innerHTML = html;
    } catch (e) {
      content.innerHTML = `<div style="color:var(--red)">加载失败: ${e.message}</div>`;
    }
  }

  async function wlAdd() {
    const sym = prompt('股票代码:').trim().toUpperCase();
    if (!sym) return;
    await fetch(`${API}/watchlist`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ symbol: sym }) });
    loadWatchlist();
  }

  async function wlRemove() {
    const sym = prompt('股票代码:').trim().toUpperCase();
    if (!sym) return;
    await fetch(`${API}/watchlist/${sym}`, { method: 'DELETE' });
    loadWatchlist();
  }

  async function wlSetAlert() {
    const sym = prompt('股票代码:').trim().toUpperCase();
    if (!sym) return;
    const above = parseFloat(prompt('价格上限 (留空取消):'));
    const below = parseFloat(prompt('价格下限 (留空取消):'));
    await fetch(`${API}/watchlist/alert`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ symbol: sym, above: isNaN(above) ? null : above, below: isNaN(below) ? null : below }) });
    loadWatchlist();
  }

  async function wlCheck() {
    const res = await fetch(`${API}/watchlist/check`);
    const data = await res.json();
    const triggered = data.triggered || [];
    if (!triggered.length) { alert('目前无预警触发'); return; }
    alert('🚨 触发预警:\n' + triggered.map(t => `${t.symbol}: ${t.reason}`).join('\n'));
  }

  async function ttsTest() {
    const text = prompt('输入要朗读的文字:');
    if (!text) return;
    try {
      await fetch(`${API}/tts`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text }) });
    } catch (e) { alert('TTS失败: ' + e.message); }
  }

  var currentHistory = [];

  async function loadHistory() {
    const panel = document.getElementById('history-panel');
    const content = document.getElementById('history-content');
    panel.style.display = 'block';
    document.getElementById('report').classList.remove('show');
    document.getElementById('compare-output').style.display = 'none';
    document.getElementById('portfolio-panel').style.display = 'none';
    document.getElementById('watchlist-panel').style.display = 'none';
    content.innerHTML = '加载中...';
    try {
      const res = await fetch(`${API}/history?limit=100`);
      const data = await res.json();
      currentHistory = Array.isArray(data) ? data : [];
      renderHistory(currentHistory);
    } catch (e) {
      content.innerHTML = `<div style="color:var(--red)">加载失败: ${e.message}</div>`;
    }
  }

  function renderHistory(records) {
    const content = document.getElementById('history-content');
    const filter = document.getElementById('historyFilter').value.toUpperCase();
    const filtered = filter ? records.filter(r => (r.symbol || '').toUpperCase().includes(filter) || (r.query || '').toUpperCase().includes(filter)) : records;
    if (!filtered.length) {
      content.innerHTML = '<div style="color:var(--muted)">暂无历史记录</div>';
      return;
    }
    let html = '<table style="width:100%;border-collapse:collapse;font-size:0.82rem;">';
    html += '<tr style="border-bottom:2px solid var(--border);"><th style="text-align:left;padding:0.3rem 0.5rem">时间</th><th style="text-align:left;padding:0.3rem 0.5rem">股票</th><th style="text-align:left;padding:0.3rem 0.5rem">查询</th><th style="padding:0.3rem 0.5rem">信号</th></tr>';
    for (const r of filtered) {
      const sig = r.signal || '-';
      const sigColor = sig.includes('bull') ? 'var(--green)' : sig.includes('bear') ? 'var(--red)' : 'var(--muted)';
      const time = r.timestamp ? new Date(r.timestamp).toLocaleString('zh-CN', { hour12: false }) : '-';
      html += `<tr style="border-bottom:1px solid var(--border);cursor:pointer" onclick="replayHistory('${r.id}')" title="点击回放报告">`;
      html += `<td style="padding:0.3rem 0.5rem;color:var(--muted);font-size:0.75rem">${time}</td>`;
      html += `<td style="padding:0.3rem 0.5rem;font-weight:700">${r.symbol || '-'}</td>`;
      html += `<td style="padding:0.3rem 0.5rem">${r.query || '-'}</td>`;
      html += `<td style="padding:0.3rem 0.5rem;color:${sigColor}">${sig}</td>`;
      html += `</tr>`;
    }
    html += '</table>';
    content.innerHTML = html;
  }

  async function replayHistory(id) {
    const record = currentHistory.find(r => r.id == id);
    if (!record) return;
    document.getElementById('report').classList.add('show');
    document.getElementById('reportSymbol').textContent = record.symbol || '';
    document.getElementById('reportSource').textContent = '历史回放';
    document.getElementById('reportBody').innerHTML = (record.report || '').replace(/\n/g, '<br>');
    document.getElementById('history-panel').style.display = 'none';
  }
</script>
</body>
